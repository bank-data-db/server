edition = "2024";

package transactions;

import option "patch/go.proto";

option go_package = "github.com/shadiestgoat/bankDataDB/pb/transactions";
option (go.lint).all = true;

enum OrderField {
  AUTHED_AT  = 0;
  SETTLED_AT = 1;
  AMOUNT     = 2;
}

message ReqList {
  uint32 page_size        = 1;
  string pagination_token = 2;

  OrderField order_by   = 3;
  bool       descending = 4;

  // Filter by card id
  string card_id = 5;
}

message RespList {
  uint32 total_count      = 1;
  string pagination_token = 2;

  repeated Transaction result = 3;
}

// A specific transaction
message Transaction {
  // ID of the transaction
  string id = 1;
  // The card this transaction is on
  string card_id = 2;
  // The time the transaction was settled at (unix milliseconds)
  int64 settled_at = 3;
  // The time the transaction was authed at (unix milliseconds)
  int64 authed_at = 4;
  // Bank's description of the transaction
  string description = 5;
  // The amount in the transaction
  double amount = 6;
  // The actual name of this transaction. Might be not present.
  string resolved_name = 7;
  // The category of this transaction. Might be not present.
  string resolved_category_id = 8;
}

// A specific transaction
message ReqNew {
  reserved 1;
  // The card this transaction is on
  string card_id = 2;
  // The time the transaction was settled at (unix milliseconds)
  int64 settled_at = 3;
  // The time the transaction was authed at (unix milliseconds)
  int64 authed_at = 4;
  // Bank's description of the transaction
  string description = 5;
  // The amount in the transaction
  double amount = 6;
  // The actual name of this transaction. Might be not present.
  string resolved_name = 7;
  // The category of this transaction. Might be not present.
  string resolved_category_id = 8;
}
