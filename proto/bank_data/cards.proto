edition = "2024";

package cards;

import option "patch/go.proto";

option (go.lint).all = true;
option go_package = "github.com/shadiestgoat/bankDataDB/pb/cards";

message ReqList {
  uint32 page_size        = 1;
  string pagination_token = 2;
}

message RespList {
  uint32 total_count      = 1;
  string pagination_token = 2;

  repeated Card result = 3;
}

// A card is an account of sorts for a specific user
message Card {
  // The ID of the card
  string id = 1;
  // The name of the card/account
  string name = 2;
}

message ReqNew {
  reserved 1;
  // The name of the card/account
  string name = 2;
}
